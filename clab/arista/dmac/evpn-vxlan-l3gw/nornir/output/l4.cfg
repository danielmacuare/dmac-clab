! GENERAL CONFIG - Role: leaf
hostname l4
no enable password
no aaa root

! Used for internal VLANs on routed ports. 
vlan internal order ascending range 1000 1200

! Required to enable EVPN Address Family (ArBGP Model)
service routing protocols model multi-agent

! Split 40G interface into 4 x 10G
transceiver qsfp default-mode 4x10G

! USERS
username admin privilege 15 role network-admin secret 0 admin

! VRF AND SERVICES
vrf instance MGMT

! GNMI
management api gnmi
   transport grpc default
      vrf MGMT

! NETCONF
management api netconf
   transport ssh default
      vrf MGMT

! eAPI
management api http-commands
   protocol https
   no shutdown
   !
   vrf MGMT
      no shutdown

! IP ROUTING
ip routing
ip route vrf MGMT 0.0.0.0/0 172.100.100.1
ipv6 route vrf MGMT ::/0 2001:172:100:100::1

! MGMT INTERFACE
interface Management0
   vrf MGMT
   ip address 172.100.100.64/24
   ipv6 address 2001:172:100:100::64/64

! LOOPBACK INTERFACES
interface Loopback0
   description EVPN_RID_L4
   no shutdown
   ip address 10.255.0.14/32
!
interface Loopback1
   description VTEP_SOURCE_L4
   no shutdown
   ip address 10.255.1.14/32
   
! LEAF-SPINE-INTERFACES
Interface Ethernet 1
   description P2P_S1_Eth4
   no shutdown
   mtu 9214
   no switchport
   ip address 10.254.1.7/31

Interface Ethernet 2
   description P2P_S2_Eth4
   no shutdown
   mtu 9214
   no switchport
   ip address 10.254.2.7/31

! LEAF-ONLY-CONFIG
! Each Leaf should become a root STP bridge in its own segment to avoid someone else plugin a switch in the access ports and causing that switch to be elected as root or causing a L2 loop.

spanning-tree mode mstp
spanning-tree mst 0 priority 4096

! UNDERLAY
! The aim here is to create BGP Peerings via the physical interfaces between the Leaves and the Spines.
! After the peering has been created, we will advertise the Lo0 via eBGP to be used for peering in the OVerlay (EVPN - Control Plane) and L1 to be used as the VTEP Source IP (VXLAN - Data Plane)

! Define the Loopbacks we want to advertise
ip prefix-list PL-LOOPBACKS seq 10 permit  10.255.0.14/32
ip prefix-list PL-LOOPBACKS seq 20 permit  10.255.1.14/32


ip prefix-list P2P-UNDERLAY seq 10 permit  10.254.1.7/31
ip prefix-list P2P-UNDERLAY seq 20 permit  10.254.2.7/31

! Create a Route Map
route-map RM-UNDERLAY-ADVERTISE permit 10
   match ip address prefix-list PL-LOOPBACKS 
route-map RM-UNDERLAY-ADVERTISE permit 20
   match ip address prefix-list P2P-UNDERLAY

router bgp 65004
   router-id 10.255.0.14
   ! Avoids blackholing prefixes not yet present in the FIB
   update wait-install
   ! You will not only exchange IPv4 routes but also EVPN routes
   no bgp default ipv4-unicast
   ! ECMP load-balancing - Maximum paths 
   maximum-paths 12
   ! ECMP AS-Path Relaxed
   bgp bestpath as-path multipath-relax
   redistribute connected route-map RM-UNDERLAY-ADVERTISE

   neighbor IPV4-SPINES peer group
   neighbor IPV4-SPINES password 0 dmac
   neighbor IPV4-SPINES send-community
   neighbor IPV4-SPINES maximum-routes 12000
   neighbor IPV4-SPINES remote-as 64600
   neighbor IPV4-SPINES route-map RM-UNDERLAY-ADVERTISE out
   neighbor IPV4-SPINES bfd
   neighbor IPV4-SPINES bfd interval 50 min-rx 50 multiplier 3

   ! S1 BGP Neighbor
   neighbor 10.254.1.6 description S1_ETH4
   neighbor 10.254.1.6 peer group IPV4-SPINES

   ! S2 BGP Neighbor  
   neighbor 10.254.2.6 description S2_ETH4
   neighbor 10.254.2.6 peer group IPV4-SPINES

! OVERLAY

   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS remote-as 64600
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS bfd interval 500 min-rx 500 multiplier 3
   ! 2 would suffice we are not using MLAG and iBGP between MLAG Peers but we will set it to 3
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS password 0 dmac
   ! EVPN makes uses of extended communities
   neighbor EVPN-OVERLAY-PEERS send-community extended
   ! Disable route limits as EVPN will receive/advertise a lot of routes
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0

   neighbor 10.255.0.1 description S1_LO0_EVPN
   neighbor 10.255.0.1 peer group EVPN-OVERLAY-PEERS

   neighbor 10.255.0.2 description S2_LO0_EVPN
   neighbor 10.255.0.2 peer group EVPN-OVERLAY-PEERS

   address-family ipv4
      neighbor IPV4-SPINES activate

   address-family evpn
    neighbor EVPN-OVERLAY-PEERS activate

! Exit Address Family mode
exit
! Exit Router BGP mode
exit


! L2VNIs
! VLAN Definitions

vlan 10
  name VLAN10
vlan 20
  name VLAN20
vlan 30
  name VLAN30
vlan 40
  name VLAN40
vlan 50
  name VLAN50
vlan 60
  name VLAN60
vlan 70
  name VLAN70
vlan 80
  name VLAN80
vlan 90
  name VLAN90
vlan 100
  name VLAN100

interface Vxlan1
  vxlan source-interface Loopback1
  vxlan udp-port 4789
  ! Automated VLAN to VNI mapping
  vxlan vlan 10-1000 vni 10010-11000
  