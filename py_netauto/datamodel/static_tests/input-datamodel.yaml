# Lean Fabric Data Model - Only Input Fields (Computed Fields Handled by Pydantic)
# Computed Fields: role, fabric_asn, router_id (from Loopback0), vtep_ipv4 (from Loopback1)

schema_version: "1.0.1"
schema_description: "Lean data model for ceos_clab_clos - 2 spines, 5 leaves"
fabric_name: ceos_clab_clos

